<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro AYVY</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Montserrat", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url(img/imagem-ayvy-clara.png) no-repeat center center fixed;
            background-size: cover;
            padding: 40px 20px;
        }

        .container {
            width: 450px;
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: #fff;
            padding: 30px 40px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .container h1 {
            font-size: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .user-type-selection {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .radio-card { flex: 1; }
        .radio-card input { display: none; }
        .radio-card label {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .radio-card input:checked + label {
            background: #fff;
            color: #333;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            width: 100%;
            height: 48px;
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            outline: none;
            font-size: 15px;
            color: #fff;
            padding: 0 20px 0 45px;
        }

        .input-box input::placeholder { color: #ddd; }

        .input-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #fff;
        }

        .label-pequena {
            font-size: 11px;
            margin-left: 15px;
            margin-bottom: 5px;
            display: block;
            color: #ccc;
        }

        /* Lembrar Senha */
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            margin: 10px 0 20px 5px;
            font-size: 14px;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-forgot label input {
            accent-color: #fff;
            margin-right: 8px;
        }

        .btn-register {
            width: 100%;
            height: 50px;
            background-color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: transparent;
            border: 2px solid #fff;
            color: #fff;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .container { width: 95%; padding: 25px; }
        }
    </style>
</head>
<body>

    <main class="container" style="display: none">
        <form>
            <h1>Cadastro AYVY</h1>

            <p style="text-align: center; font-size: 13px; margin-bottom: 10px;">O que você deseja ser?</p>
            <div class="user-type-selection">
                <div class="radio-card">
                    <input type="radio" id="cliente" name="tipo" value="cliente" checked onchange="mudarDoc()">
                    <label for="cliente">Sou Cliente</label>
                </div>
                <div class="radio-card">
                    <input type="radio" id="lojista" name="tipo" value="lojista" onchange="mudarDoc()">
                    <label for="lojista">Sou Lojista</label>
                </div>
            </div>

            <div class="input-box">
                <i class='bx bxs-user'></i>
                <input type="text" placeholder="Nome Completo" required>
            </div>

            <span class="label-pequena">Data de Nascimento</span>
            <div class="input-box">
                <i class='bx bxs-calendar'></i>
                <input type="date" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-envelope'></i>
                <input type="email" placeholder="E-mail" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-id-card'></i>
                <input type="text" id="documento" placeholder="CPF" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-map-pin'></i>
                <input type="text" placeholder="CEP" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-direction-left'></i>
                <input type="text" placeholder="Logradouro" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-navigation'></i>
                <input type="text" placeholder="Número" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-building-house'></i>
                <input type="text" placeholder="Bairro" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-city'></i>
                <input type="text" placeholder="Cidade" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-map-alt'></i>
                <input type="text" placeholder="Estado (Ex: SP)" maxlength="2" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-lock-alt'></i>
                <input type="password" placeholder="Crie uma Senha" required>
            </div>

            <div class="input-box">
                <i class='bx bxs-lock-open-alt'></i>
                <input type="password" placeholder="Confirme a Senha" required>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox"> Lembrar Senha</label>
            </div>

            <button type="submit" class="btn-register">Finalizar Cadastro</button>

            <div class="login-link">
                <p>Já tem uma conta? <a href="login.html">Faça Login</a></p>
            </div>
        </form>
    </main>

    <script>
        function mudarDoc() {
            const isLojista = document.getElementById('lojista').checked;
            const inputDoc = document.getElementById('documento');
            if(inputDoc) {
                inputDoc.placeholder = isLojista ? "CNPJ da Empresa" : "CPF";
            }
        }

        setTimeout(() => {
            const el = document.querySelector(".container");
            if (!el) return;
            
            el.style.display = "block";
            el.style.opacity = "0";
            el.style.transform = "translateY(15px)";
            el.style.transition = "opacity 500ms ease, transform 500ms ease";
            
            void el.offsetWidth;
            
            requestAnimationFrame(() => {
                el.style.opacity = "1";
                el.style.transform = "translateY(0)";
            });
        }, 100); 
    </script>
</body>
</html>
