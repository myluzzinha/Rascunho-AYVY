<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <title>Login da AYVY</title>
  </head>
  <body>
    <main class="container" style="display: none">
      <form>
        <h1>Login AYVY</h1>
        <div class="input-box">
          <input placeholder="Usuário" type="email" />
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input placeholder="Senha" type="password" />
          <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="remember-forgot">
          <label>
            <input type="checkbox" />
            Lembrar Senha
          </label>
          <a href="#">Esqueci Senha</a>
        </div>

        <button type="submit" class="login">Login</button>

        <div class="resgister-link">
          <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </div>
      </form>
    </main>
    <script>
      // exibe .container após 5s com transição suave
      setTimeout(() => {
        const el = document.querySelector(".container");
        if (!el) return;
        el.style.display = "block";
        // configura estado inicial para a transição
        el.style.opacity = "0";
        el.style.transform = "translateY(10px)";
        el.style.transition = "opacity 400ms ease, transform 400ms ease";
        // força reflow para garantir que a transição ocorra
        void el.offsetWidth;
        // inicia a animação no próximo frame
        requestAnimationFrame(() => {
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        });
      }, 100);
    </script>
  </body>
</html>
