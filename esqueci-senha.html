<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="esqueci-senha.css" />
    <title>Recuperar Senha | AYVY</title>
  </head>
  <body>
    <main class="container" style="display: none">
      <form>
        <h1>Nova Senha</h1>
        <p class="instrucao">
          Crie uma senha forte para proteger sua conta na AYVY.
        </p>

        <div class="input-box">
          <input placeholder="Senha Nova" type="password" required />
          <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="input-box">
          <input placeholder="Repetir Senha Nova" type="password" required />
          <i class="bx bxs-lock-open-alt"></i>
        </div>

        <div class="remember-forgot">
          <label>
            <input type="checkbox" />
            Lembrar Nova Senha
          </label>
        </div>

        <button type="submit" class="btn-save">Salvar Alterações</button>

        <a class="back-login" href="login.html">Voltar para o Login</a>
      </form>
    </main>

    <script src="esqueci-senha.js"></script>
  </body>
</html>
